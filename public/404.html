<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — WID-ELLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root { --plum: #7B4A5A; --rose: #C9848A; --gold: #C4A882; --cream: #FAF6F2; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 32px;
    }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; letter-spacing: 0.2em; color: var(--plum); margin-bottom: 48px; }
    .num { font-family: 'Cormorant Garamond', serif; font-size: 8rem; font-weight: 300; color: rgba(123,74,90,0.1); line-height: 1; margin-bottom: 24px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; color: var(--plum); margin-bottom: 16px; }
    p { font-size: 0.88rem; color: #7a6572; margin-bottom: 40px; }
    a {
      display: inline-block; padding: 14px 36px;
      background: var(--plum); color: #fff;
      font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none; border-radius: 2px;
      transition: background 0.3s;
    }
    a:hover { background: var(--rose); }
  </style>
</head>
<body>
  <p class="logo">WID-ELLE</p>
  <p class="num">404</p>
  <h1>Page introuvable</h1>
  <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
  <a href="/">Retour à la boutique</a>
</body>
</html>
